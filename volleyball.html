    <link rel="stylesheet" href="./css/style.min.css" />
    <title>Волейбол</title>

  <body>
    <div class="hobby__page">
      <div class="container">
        <header class="header">
          <a href="index.html" class="logo">
            <img src="images/logo.png" alt="Логотип" class="logo__img" />
          </a>

          <button class="header__btn">
            <span class="header__btn-span"></span
            ><span class="header__btn-span"></span
            ><span class="header__btn-span"></span>
          </button>

          <ul class="menu">
            <li class="menu__item">
              <a href="./index.html#home" class="menu__link">Головна</a>

            <li class="menu__item">

            </li>
            <li class="menu__item">
              <a href="./index.html#about" class="menu__link">Про нас</a>
            </li>
            <li class="menu__item">
              <a href="./index.html#activity" class="menu__link">Заходи</a>
            </li>
            <li class="menu__item">
              <a href="./index.html#news" class="menu__link">Новини</a>
            </li>
          </ul>
        </header>
      </div>

      <section class="hobby">
        <div class="container">
          <div class="volleryball__inner">
            <img
              src="./images/voleyball.jpg"
              alt="Волейбол"
              class="hobby__img"
            />
            <h1 class="hobby__title">Волейбол</h1>
            <ul class="hobby__info">
              <li class="hobby__info-item">
                Місце проведення: Вишенське озеро
              </li>
              <li class="hobby__info-item">Час проведення: 12:00-13:30</li>
              <li class="hobby__info-item">
                Дата проведення: Субота 17 червня
              </li>
              <li class="hobby__info-item">Кількість людей: мінімум 10</li>
              <li class="hobby__info-item">
                Додаткова інформація: Можливий турнір, залежно від бажання інших
              </li>
            </ul>
            <a href="#" class="home__btn home__btn--big hobby__register"
              >Зареєструватися</a
            >
          </div>
        </div>
      </section>
